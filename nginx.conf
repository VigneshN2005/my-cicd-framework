# nginx.conf
# This configures Nginx web server inside Docker
# Nginx does 2 things:
#   1. Serves your React frontend (static files)
#   2. Forwards /api requests to FastAPI backend

server {
    # Nginx listens on port 80 inside container
    listen 80;

    # ─────────────────────────────────────
    # FRONTEND
    # Serve React build files from /app/dist
    # ─────────────────────────────────────
    location / {
        root /app/dist;           # React build folder
        index index.html;
        
        # This handles React Router (page refresh works)
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────
    # BACKEND
    # Forward /api requests to FastAPI
    # ─────────────────────────────────────
    location /api {
        proxy_pass http://localhost:8000;    # FastAPI runs here
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}